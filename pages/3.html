<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Footer</title>
    <style>
      /* Ensure the body takes up the full viewport height */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%; /* Full height of the viewport */
      }

      /* Main content container */
      .content {
        min-height: 100vh; /* Make sure content fills full height */
        padding-bottom: 50px; /* Prevent footer overlap */
      }

      /* Footer styles */
      .footer {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 60px;
        background-color: #333;
        color: white;
        text-align: center;
        line-height: 60px; /* Center text vertically */
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Page Content</h1>
      <p>This is where your page content goes.</p>
    </div>

    <div class="footer">This is the footer that stays at the bottom.</div>
  </body>
</html>
