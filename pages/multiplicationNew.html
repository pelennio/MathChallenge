<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Acme&family=Black+Ops+One&display=swap" rel="stylesheet" />

  <link rel="shortcut icon" href="#" />
  <title>😺 New multiplication page</title>
</head>

<body>
  <div id="snowflakeContainer">
    <img class="snowflake" src="../src/icons_1.svg" />
  </div>
  <section class="head">
      <div class="nav-container">
    <ul class="nav">
      <li class="nav-item">
        <a class="nav-link" href="./index.html">Home</a>
      </li>
    </ul>
    <h2 >Here we are going to practice </h2>
    <h1> multiplication</h1>
    </div>
  </section>


  <section class="section" id="sec1">
    <div class="lay">
      <div class="container_main container_float" id="multiplicatorForm">
        <p>
          <label class="result2" id="nameLable">Enter the number to be checked:</label>
        </p>
        <input pattern="[0-9]*" inputmode="numeric" id="userinput" type="number"  placeholder="Type your number" autofocus autocomplete="off" />
        <button id="multiplicator" type="submit">Start the challenge</button>
        <button hidden id="newMultiplicator" type="submit" >Set up another number</button>
      </br><p class="result2" id="multiplicatorCheckError">⛄️ </p>

      <p id="score">Score : 0</p>
      <p id="wrongAnswerCount">Wrong_Answers : 0</p>
      <div class="heart1">
      <img class="heart" src="../src/red_heart.gif" id="heart1" alt="Computer man">
      <img class="heart" src="../src/red_heart.gif" id="heart2" alt="Computer man">
      <img class="heart" src="../src/red_heart.gif" id="heart3" alt="Computer man">
      <hr> <!-- Horizontal line -->
      <div class="button-container">
      <button id="header1" class="collapsible_new">The results of the challange</button>
    
    
      <button id="header2" class="collapsible_new">The scores of the challanges</button>
    </div>

  


    </div></p>
      
      </div>


      <div class="container_main container_float results">
        <p class="result2" id="multiplicatorCheckResult">⏰</p>
      </br>
      <button class="challenge" id="challenge"></button>
      <input pattern="[0-9]*" type="number" inputmode="numeric" placeholder="Your answer" id="userAnswer" autofocus autocomplete="off" />
      <button id="checkAnswer">Check your answer</button><br />
      <button id="nextProblem">Next Problem</button><br />
      <p id="answerCheckResult" class="answerCheckResult"></p>
      <img class="pete1" src="../src/pngaaa.com-757953.png" alt="" />
      </div>
    </div>
   
  </section>

  <!-- First Modal -->
  <div id="modal1" class="modal">
    <!-- Modal Content -->
    <div class="modal-content">
      <span class="close" data-modal="modal1">&times;</span>
      <h2>Current challenge results</h2>
      <p></p>
      <div class="addSomeName">
        <table>
          <thead>
            <tr>
              <th>N-1</th>
              <th>N-2</th>
              <th>Answer</th>
            </tr>
          </thead>
          <tbody id="data-output"></tbody>
        </table></div> 
    </div>
  </div>

  <!-- Second Modal -->
  <div id="modal2" class="modal">
    <!-- Modal Content -->
    <div class="modal-content">
      <span class="close" data-modal="modal2">&times;</span>
      <h2>All challenges results</h2>
      <p></p>
     
      <div class="addSomeName">
        <table>
          <thead>
            <tr>
              <th>Multiplication for:</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody id="data-output1"></tbody>
        </table>
      </div>
    </div>
  </div>



  
  <footer class="footer" id="sec-a5e5">
    <div class="u-clearfix u-sheet u-sheet-1">
      <p>Part of my learning<br>
      </p>
    </div>
  </footer>
  </section>
  <script type="module" src="../app/multiplicationListener.js"></script>
  <script type="module" src="../app/snowflakes.js"></script>
</body>

</html>
